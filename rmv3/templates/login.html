<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RM Facilities — Acesso</title>
<link rel="stylesheet" href="/static/css/main.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#eef1f6}
.box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.logo{text-align:center;margin-bottom:28px}
.logo img{height:54px;width:auto;object-fit:contain}
.logo-txt{font-size:22px;font-weight:700;color:var(--azul)}
h2{font-size:18px;font-weight:700;color:var(--azul);text-align:center;margin-bottom:6px}
.sub{font-size:13px;color:#888;text-align:center;margin-bottom:28px}
.erro{background:var(--verm-cl);color:var(--verm);border-radius:var(--r);padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:16px;text-align:center}
.btn-login{width:100%;background:var(--azul);color:#fff;border:none;border-radius:var(--r);padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn-login:hover{opacity:.88}
.rodape{text-align:center;margin-top:24px;font-size:12px;color:#bbb}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <img src="https://rmfacilities.com.br/wp-content/uploads/2023/08/logo-rm-facilities-1.png" alt="RM Facilities"
         onerror="this.style.display='none';document.getElementById('ltxt').style.display='block'">
    <div id="ltxt" class="logo-txt" style="display:none">RM Facilities</div>
  </div>
  <h2>Acesso ao sistema</h2>
  <p class="sub">Entre com seu e-mail e senha</p>
  {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
  <form method="POST">
    <div class="f" style="margin-bottom:14px"><label>E-mail</label><input type="email" name="email" placeholder="seu@email.com.br" required autofocus></div>
    <div class="f" style="margin-bottom:14px"><label>Senha</label><input type="password" name="senha" placeholder="••••••••" required></div>
    <button type="submit" class="btn-login">Entrar</button>
  </form>
  <div class="rodape">RM Facilities · Sistema de Gestão v3.0</div>
</div>
</body>
</html>
