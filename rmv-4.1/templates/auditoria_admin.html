<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auditoria — RM Facilities</title>
  <style>
    :root{
      --bg:#0a1624;
      --card:#0f2237;
      --line:#1f3d5b;
      --text:#e8f0f8;
      --muted:#9ab1c7;
      --accent:#67b7ff;
      --ok:#70d6a5;
      --err:#f06a6a;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 "Segoe UI",Tahoma,Arial,sans-serif}
    header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    header h1{margin:0;font-size:18px}
    header a{color:var(--accent);text-decoration:none;font-size:13px}
    .wrap{max-width:1400px;margin:0 auto;padding:16px 20px 60px}
    .filtros{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px}
    .filtros label{display:flex;flex-direction:column;font-size:12px;color:var(--muted);gap:4px}
    .filtros input,.filtros select{background:#08111c;color:var(--text);border:1px solid var(--line);border-radius:6px;padding:7px 9px;font-size:13px}
    .filtros .actions{display:flex;align-items:flex-end;gap:8px}
    button{background:var(--accent);color:#001b30;border:0;border-radius:6px;padding:9px 14px;cursor:pointer;font-weight:600;font-size:13px}
    button.alt{background:transparent;color:var(--accent);border:1px solid var(--accent)}
    table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:13px}
    th,td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}
    th{background:#0c1c30;color:var(--accent);font-weight:600;position:sticky;top:0}
    tr:last-child td{border-bottom:0}
    tr:hover td{background:rgba(103,183,255,.05)}
    .badge-ok{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;background:rgba(112,214,165,.15);color:var(--ok);border:1px solid rgba(112,214,165,.3)}
    .badge-err{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;background:rgba(240,106,106,.15);color:var(--err);border:1px solid rgba(240,106,106,.3)}
    .det{font-family:Consolas,Monaco,monospace;font-size:11px;color:var(--muted);max-width:340px;word-break:break-all;white-space:pre-wrap}
    .pager{display:flex;justify-content:space-between;align-items:center;margin-top:14px;color:var(--muted);font-size:13px}
    .pager .nav{display:flex;gap:8px}
    .msg{padding:10px 14px;border-radius:8px;margin:10px 0;font-size:13px}
    .msg.err{background:rgba(240,106,106,.1);color:var(--err);border:1px solid rgba(240,106,106,.3)}
    .empty{padding:30px;text-align:center;color:var(--muted)}
    @media(max-width:700px){.det{max-width:200px}}
  </style>
</head>
<body>
  <header>
    <h1>Auditoria</h1>
    <a href="/">&larr; Voltar ao app</a>
    <span style="flex:1"></span>
    <span style="color:var(--muted);font-size:12px">Trilha de eventos críticos do sistema</span>
  </header>

  <main class="wrap">
    <form id="formFiltros" class="filtros" onsubmit="event.preventDefault();carregar(1);">
      <label>Evento (contém)
        <input type="text" name="evento" placeholder="ex: login, doc_assinar">
      </label>
      <label>Ator tipo
        <input type="text" name="ator_tipo" placeholder="usuario, funcionario...">
      </label>
      <label>Ator ID
        <input type="text" name="ator_id">
      </label>
      <label>Alvo tipo
        <input type="text" name="alvo_tipo">
      </label>
      <label>Alvo ID
        <input type="text" name="alvo_id">
      </label>
      <label>IP
        <input type="text" name="ip">
      </label>
      <label>Status
        <select name="ok">
          <option value="">Todos</option>
          <option value="1">Sucesso</option>
          <option value="0">Falha</option>
        </select>
      </label>
      <label>Desde
        <input type="datetime-local" name="desde">
      </label>
      <label>Até
        <input type="datetime-local" name="ate">
      </label>
      <label>Por página
        <select name="per_page">
          <option>25</option>
          <option selected>50</option>
          <option>100</option>
          <option>200</option>
        </select>
      </label>
      <div class="actions">
        <button type="submit">Filtrar</button>
        <button type="button" class="alt" onclick="limpar()">Limpar</button>
      </div>
    </form>

    <div id="msg"></div>

    <div style="overflow:auto;max-height:70vh">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Data/Hora</th>
            <th>Evento</th>
            <th>Status</th>
            <th>Ator</th>
            <th>Alvo</th>
            <th>IP</th>
            <th>Detalhe</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="8" class="empty">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pager">
      <div id="resumo">—</div>
      <div class="nav">
        <button type="button" class="alt" id="btnAnt" onclick="navegar(-1)">&laquo; Anterior</button>
        <button type="button" class="alt" id="btnProx" onclick="navegar(1)">Próximo &raquo;</button>
      </div>
    </div>
  </main>

  <script>
    let estado={page:1,per_page:50,total:0};

    function valForm(){
      const f=document.getElementById("formFiltros");
      const fd=new FormData(f);
      const out={};
      for(const [k,v] of fd.entries()){
        const s=(v||"").toString().trim();
        if(s) out[k]=s;
      }
      return out;
    }

    function escapeHtml(s){
      return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    async function carregar(page){
      estado.page=page||1;
      const params=valForm();
      params.page=estado.page;
      estado.per_page=parseInt(params.per_page||"50",10);
      const qs=new URLSearchParams(params).toString();
      const tbody=document.getElementById("tbody");
      const msg=document.getElementById("msg");
      msg.innerHTML="";
      tbody.innerHTML='<tr><td colspan="8" class="empty">Carregando...</td></tr>';
      try{
        const r=await fetch("/api/auditoria?"+qs,{credentials:"same-origin"});
        if(!r.ok){
          const txt=await r.text();
          msg.innerHTML='<div class="msg err">Erro '+r.status+': '+escapeHtml(txt.slice(0,300))+'</div>';
          tbody.innerHTML='<tr><td colspan="8" class="empty">—</td></tr>';
          return;
        }
        const j=await r.json();
        estado.total=j.total||0;
        renderizar(j.itens||[]);
        document.getElementById("resumo").textContent=
          "Mostrando "+((j.itens||[]).length)+" de "+estado.total+" registros (página "+estado.page+")";
        document.getElementById("btnAnt").disabled=estado.page<=1;
        document.getElementById("btnProx").disabled=(estado.page*estado.per_page)>=estado.total;
      }catch(e){
        msg.innerHTML='<div class="msg err">Falha de rede: '+escapeHtml(e.message||e)+'</div>';
        tbody.innerHTML='<tr><td colspan="8" class="empty">—</td></tr>';
      }
    }

    function renderizar(itens){
      const tbody=document.getElementById("tbody");
      if(!itens.length){
        tbody.innerHTML='<tr><td colspan="8" class="empty">Nenhum evento encontrado para os filtros aplicados.</td></tr>';
        return;
      }
      tbody.innerHTML=itens.map(it=>{
        const ator=(it.ator_tipo||it.ator_id)?escapeHtml((it.ator_tipo||"")+" "+(it.ator_id||"")):"-";
        const alvo=(it.alvo_tipo||it.alvo_id)?escapeHtml((it.alvo_tipo||"")+" "+(it.alvo_id||"")):"-";
        const badge=it.ok?'<span class="badge-ok">OK</span>':'<span class="badge-err">FALHA</span>';
        return "<tr>"+
          "<td>"+escapeHtml(it.id)+"</td>"+
          "<td>"+escapeHtml(it.criado_em)+"</td>"+
          "<td>"+escapeHtml(it.evento)+"</td>"+
          "<td>"+badge+"</td>"+
          "<td>"+ator+"</td>"+
          "<td>"+alvo+"</td>"+
          "<td>"+escapeHtml(it.ip)+"</td>"+
          '<td class="det">'+escapeHtml(it.detalhe)+"</td>"+
          "</tr>";
      }).join("");
    }

    function navegar(d){
      const novaPg=estado.page+d;
      if(novaPg<1) return;
      if(d>0 && (estado.page*estado.per_page)>=estado.total) return;
      carregar(novaPg);
    }

    function limpar(){
      document.getElementById("formFiltros").reset();
      carregar(1);
    }

    carregar(1);
  </script>
</body>
</html>
