<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Ponto · Totem QR</title>
<style>
  :root{
    --bg:#0a1624;
    --bg-grad:#10243a;
    --fg:#e6f1ff;
    --muted:#7ea7d6;
    --accent:#67b7ff;
    --accent-2:#ff5fa2;
    --card:#0f2237;
    --ring:rgba(103,183,255,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:radial-gradient(ellipse at top,var(--bg-grad),var(--bg) 70%);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px 16px;text-align:center}
  .topbar{position:fixed;top:14px;left:18px;right:18px;display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:12px;letter-spacing:.05em;text-transform:uppercase}
  .topbar .brand{font-weight:700;color:var(--accent)}
  .data{font-size:clamp(14px,1.6vw,20px);color:var(--muted);letter-spacing:.04em;margin-bottom:-4px;text-transform:capitalize}
  .clock{font-variant-numeric:tabular-nums;font-weight:800;font-size:clamp(46px,7vw,86px);line-height:1;letter-spacing:-.02em;background:linear-gradient(180deg,#fff 0%,var(--accent) 60%,#3a86c4 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 50px rgba(103,183,255,.18)}
  .seconds{font-size:.4em;color:var(--accent);margin-left:.05em;font-weight:600}
  .qr-card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 0 5px var(--ring);position:relative}
  .qr-card svg{display:block;width:clamp(200px,40vh,300px);height:clamp(200px,40vh,300px)}
  .qr-card.expiring svg{opacity:.55;transition:opacity .15s}
  .pulse{position:absolute;inset:-8px;border-radius:24px;border:2px solid var(--accent);opacity:0;animation:pulse 1s linear infinite}
  @keyframes pulse{0%{opacity:.0;transform:scale(.97)}40%{opacity:.6}100%{opacity:0;transform:scale(1.04)}}
  .ttl-bar{width:clamp(200px,40vh,300px);height:6px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-top:2px}
  .ttl-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));width:100%;transform-origin:left center;transition:transform 1s linear}
  .hint{font-size:clamp(12px,1.1vw,15px);color:var(--muted);max-width:560px;line-height:1.4;margin-top:4px}
  .hint b{color:#fff;font-weight:600}
  .err{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:#7a1a2e;color:#fff;padding:6px 14px;border-radius:99px;font-size:12px;opacity:0;transition:opacity .2s;pointer-events:none}
  .err.show{opacity:1}
  .footer{position:fixed;bottom:12px;right:18px;color:#3a567a;font-size:10px;letter-spacing:.08em;text-transform:uppercase}
  @media (max-width:720px){
    .clock{font-size:clamp(44px,12vw,80px)}
    .qr-card svg{width:70vw;height:70vw;max-width:280px;max-height:280px}
    .ttl-bar{width:70vw;max-width:280px}
  }
  @media (orientation:landscape) and (min-width:900px){
    /* Em monitor horizontal, mantem layout vertical compacto centralizado. */
    .qr-card svg{width:min(38vh,300px);height:min(38vh,300px)}
    .ttl-bar{width:min(38vh,300px)}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">RM Facilities · Ponto Totem</div>
    <div id="empresa">{{ cliente_nome }}</div>
  </div>
  <div class="wrap">
    <div class="data" id="dataExtenso">—</div>
    <div class="clock"><span id="hm">--:--</span><span class="seconds" id="ss">:--</span></div>
    <div class="qr-card" id="qrCard">
      <span class="pulse"></span>
      <div id="qrBox"></div>
    </div>
    <div class="ttl-bar"><i id="ttlFill"></i></div>
    <div class="hint">Abra o aplicativo <b>RM Funcionário</b>, toque em <b>Bater ponto por QR Code</b> e aproxime a câmera do código acima.</div>
  </div>
  <div class="err" id="errBox"></div>
  <div class="footer">Atualiza a cada segundo</div>

<script>
(function(){
  const $hm = document.getElementById('hm');
  const $ss = document.getElementById('ss');
  const $data = document.getElementById('dataExtenso');
  const $qrBox = document.getElementById('qrBox');
  const $qrCard = document.getElementById('qrCard');
  const $ttl = document.getElementById('ttlFill');
  const $err = document.getElementById('errBox');

  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const dias = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];

  function pad(n){ return n<10 ? '0'+n : ''+n; }

  function tickClock(){
    const d = new Date();
    $hm.textContent = pad(d.getHours())+':'+pad(d.getMinutes());
    $ss.textContent = ':'+pad(d.getSeconds());
    $data.textContent = dias[d.getDay()]+', '+d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
  }
  tickClock();
  setInterval(tickClock, 1000);

  let tokenExp = 0; // unix seconds
  let tokenIat = 0;
  let lastSvg = '';

  function flashErr(msg){
    $err.textContent = msg;
    $err.classList.add('show');
    setTimeout(()=>$err.classList.remove('show'), 2500);
  }

  async function refreshToken(){
    try{
      const r = await fetch('/api/ponto/qrcode/token', {
        credentials:'same-origin',
        headers:{'Accept':'application/json'},
        cache:'no-store'
      });
      if(r.status === 401 || r.status === 403){
        flashErr('Sessão expirada. Recarregue a página e faça login novamente.');
        return;
      }
      const j = await r.json();
      if(!j || !j.ok || !j.svg){
        flashErr('Falha ao gerar QR.');
        return;
      }
      tokenIat = j.iat||0;
      tokenExp = j.exp||0;
      if(j.svg !== lastSvg){
        $qrBox.innerHTML = j.svg;
        lastSvg = j.svg;
      }
    }catch(e){
      flashErr('Sem conexão com o servidor.');
    }
  }

  function tickTtl(){
    const now = Math.floor(Date.now()/1000);
    const total = Math.max(1, tokenExp - tokenIat);
    const rest = Math.max(0, tokenExp - now);
    const frac = Math.max(0, Math.min(1, rest/total));
    $ttl.style.transform = 'scaleX('+frac+')';
    if(rest <= 1) $qrCard.classList.add('expiring');
    else $qrCard.classList.remove('expiring');
  }

  refreshToken();
  setInterval(refreshToken, 1000);
  setInterval(tickTtl, 100);

  // Mantem a tela acordada quando suportado.
  try{
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').catch(()=>{});
      document.addEventListener('visibilitychange', ()=>{
        if(document.visibilityState==='visible'){
          navigator.wakeLock.request('screen').catch(()=>{});
        }
      });
    }
  }catch(_){}
})();
</script>
</body>
</html>
