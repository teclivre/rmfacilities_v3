<!-- MODAL EDICAO DE PONTO -->
<div id="mod-ponto-edit" class="mb" onclick="if(event.target===this)closeModal('ponto-edit')">
  <div class="md" style="max-width:620px">
    <div class="mh"><span class="mt">Editar marcação de ponto</span><button class="btn b-ci b-sm" onclick="closeModal('ponto-edit')">Fechar ×</button></div>
    <div class="mb-body">
      <input type="hidden" id="pe-id">
      <div class="f"><label>Colaborador</label><input id="pe-func" readonly></div>
      <div class="g2">
        <div class="f"><label>Tipo</label>
          <select id="pe-tipo">
            <option value="entrada">Entrada</option>
            <option value="saida_intervalo">Saída intervalo</option>
            <option value="retorno_intervalo">Retorno intervalo</option>
            <option value="saida">Saída</option>
          </select>
        </div>
        <div class="f"><label>Data/hora</label><input id="pe-datahora" type="datetime-local"></div>
      </div>
      <div class="f"><label>Observação</label><input id="pe-obs" placeholder="Opcional"></div>
      <div class="f"><label>Motivo da edição *</label><textarea id="pe-motivo" placeholder="Descreva por que esta batida está sendo alterada"></textarea></div>
      <div id="pe-st" class="st"></div>
      <div class="brow" style="margin-top:6px">
        <button class="btn b-ci" onclick="closeModal('ponto-edit')">Cancelar</button>
        <button class="btn b-az" onclick="salvarEdicaoMarcacaoPonto()">Salvar edição</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL EDICAO DE DIA COMPLETO -->
<div id="mod-ponto-edit-dia" class="mb" onclick="if(event.target===this)closeModal('ponto-edit-dia')">
  <div class="md" style="max-width:700px">
    <div class="mh"><span class="mt">Editar dia completo</span><button class="btn b-ci b-sm" onclick="closeModal('ponto-edit-dia')">Fechar ×</button></div>
    <div class="mb-body">
      <div id="ped-info" style="font-size:13px;margin-bottom:12px;color:var(--text-muted)">Editando todas as marcações do dia selecionado.</div>
      <div id="ped-marcacoes-wrap">
        <!-- Linhas geradas dinamicamente por pontoAbrirEditDia() -->
      </div>
      <div class="f" style="margin-top:10px"><label>Motivo da edição *</label><textarea id="ped-motivo" placeholder="Descreva o motivo das alterações deste dia"></textarea></div>
      <div id="ped-st" class="st"></div>
      <div class="brow" style="margin-top:6px">
        <button class="btn b-ci" onclick="closeModal('ponto-edit-dia')">Cancelar</button>
        <button class="btn b-az" onclick="salvarEdicaoDiaCompleto()">Salvar todas as edições</button>
      </div>
    </div>
  </div>
</div>
