[phases.setup]
nixPkgs = ["python3", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv", ". /opt/venv/bin/activate && pip install -r requirements.txt"]

[start]
cmd = "DATA_DIR=/data DATABASE_URL=sqlite:////data/rmfacilities.db gunicorn --bind 0.0.0.0:${PORT:-5000} --worker-class gevent --workers 2 --worker-connections 500 --timeout 0 app:app"
